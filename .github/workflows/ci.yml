name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend and focused tests
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Resume argument tests
        run: node scripts/resumeCliArgs.test.mjs

      - name: Desktop pet transport tests
        run: node scripts/desktopPetTransport.test.mjs

      - name: Desktop pet menu geometry tests
        run: node scripts/desktopPetMenuGeometry.test.mjs

      - name: Desktop pet size tests
        run: node scripts/desktopPetSize.test.mjs

  rust:
    name: Rust checks
    runs-on: windows-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Cargo check
        run: cargo check

      - name: Cargo tests
        run: cargo test --lib
